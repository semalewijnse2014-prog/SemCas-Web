<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
</head>

<body style="background:black;color:lime;font-family:monospace">

<pre id="screen">SemCAS REPL loading...</pre>

<script>
let pyodide;
let screen = document.getElementById("screen");

function log(text){
  screen.innerText += "\n" + text;
}

async function init(){
  pyodide = await loadPyodide();

  let code = await (await fetch("semcas.py")).text();
  pyodide.runPython(code);

  screen.innerText = "SemCAS REPL ready\nType in console: run('input')\n";
}

async function run(input){
  let result = pyodide.runPython(`SemCAS("""${input}""")`);
  log("> " + input);
  log(result);
}

init();
</script>

</body>
</html>
